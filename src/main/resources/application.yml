spring:
  application:
    name: graphrag-knowledge-assistant
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/graphrag
    username: ${POSTGRES_USER:graphrag}
    password: ${POSTGRES_PASSWORD:changeme}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      llm:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      neo4j:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

app:
  llm:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:llama3.2}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    embedding-dimension: 768
  rag:
    top-k: 7
    candidate-k: 10
  ingest:
    stale-job-minutes: 30
    queue-key: ingest:queue
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:changeme}
  agent:
    max-steps: 8
    memory-window: 10
    timeout-seconds: 120
  rate-limit:
    enabled: true
    ask-per-minute: 30
    ingest-per-minute: 10
    chat-per-minute: 30
  security:
    api-key: ${API_KEY:}
  health:
    llm-enabled: false
