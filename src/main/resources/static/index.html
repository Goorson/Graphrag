<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphRAG — Asystent wiedzy</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>GraphRAG</h1>
        <p class="subtitle">Asystent wiedzy</p>
      </header>

      <section class="upload-section">
        <div id="dropZone" class="drop-zone" tabindex="0">
          <p class="drop-zone-text">Upuść plik PDF lub MD</p>
          <p class="drop-zone-hint">lub kliknij, aby wybrać</p>
          <input type="file" id="fileInput" accept=".pdf,.md" hidden>
        </div>
        <button type="button" id="uploadBtn" class="btn btn-secondary">Dodaj plik</button>
        <p id="uploadStatus" class="upload-status" hidden></p>
      </section>

      <section class="documents-section">
        <h2>Dokumenty</h2>
        <ul id="documentList" class="document-list">
          <li class="document-empty">Ładowanie…</li>
        </ul>
      </section>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <h2>Czat</h2>
        <button type="button" id="newSessionBtn" class="btn btn-ghost" title="Nowa sesja">Nowa rozmowa</button>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Zapytaj o materiały…"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="sendBtn" class="btn btn-primary">Wyślij</button>
      </form>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
